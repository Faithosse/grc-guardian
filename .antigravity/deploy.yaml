apiVersion: deploy.antigravity.google/v1
kind: Deployment
metadata:
  name: grc-guardian-production
  agent: grc-guardian

spec:
  replicas: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  service:
    type: LoadBalancer
    port: 8080
  healthCheck:
    path: /health
    port: 8080
    initialDelaySeconds: 10
    periodSeconds: 30